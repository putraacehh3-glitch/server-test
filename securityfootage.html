        '/ctf-builder',
        '/jr-penetration-tester',
        '/hacktivities'
      ];
      const currentPath = window.location.pathname;
      const isForcedDarkTheme = forcedDarkThemePages.some((page) => currentPath === page || currentPath.startsWith(`${page}/`));

      let bgColor;
      if (isForcedDarkTheme) {
        // Always use dark background for forced dark theme pages
        bgColor = '#151c2b';
      } else {
        let cachedTheme = '';
        try {
          cachedTheme = (localStorage.getItem('cachedTheme') || '').trim();
        } catch {
          // localStorage unavailable
        }

        if (cachedTheme === 'light') {
          bgColor = '#f9f9fb';
        } else if (cachedTheme === 'dark') {
          bgColor = '#151c2b';
        } else {
          const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          bgColor = prefersDark ? '#151c2b' : '#f9f9fb';
        }
      }

      document.documentElement.style.backgroundColor = bgColor;
      document.body.style.backgroundColor = bgColor;
    })();
