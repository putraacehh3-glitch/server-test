<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[root@beni-dev]~# home</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    
    body {
        background: #000;
        color: #00ff00;
        font-family: 'Share Tech Mono', monospace;
        text-align: center;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
    }
    
    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: repeating-linear-gradient(
            0deg,
            rgba(0, 255, 0, 0.03),
            rgba(0, 255, 0, 0.03) 1px,
            transparent 1px,
            transparent 3px
        );
        pointer-events: none;
    }
    
    .terminal-box {
        background: rgba(0, 20, 0, 0.3);
        border: 2px solid #00ff00;
        box-shadow: 0 0 20px #00ff00;
        padding: 40px 30px;
        border-radius: 5px;
        max-width: 400px;
    }
    
    h1 {
        color: #00ff00;
        text-shadow: 0 0 15px #00ff00;
        font-size: 28px;
        margin: 0 0 20px 0;
    }
    
    h1::before {
        content: "[root@beni-dev]~# ";
        font-size: 18px;
        color: #00ff00;
    }
    
    p {
        font-size: 16px;
        line-height: 1.5;
        margin: 15px 0;
    }
    
    a.button {
        background: transparent;
        color: #00ff00;
        border: 1px solid #00ff00;
        padding: 12px 25px;
        margin: 8px;
        border-radius: 0;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        transition: 0.2s ease;
        box-shadow: 0 0 10px #00ff00;
        font-family: 'Share Tech Mono', monospace;
    }
    
    a.button:hover {
        background: #00ff00;
        color: #000;
        box-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00;
        transform: scale(1.05);
    }
    
    .cursor {
        display: inline-block;
        width: 10px;
        height: 18px;
        background: #00ff00;
        animation: blink 1s infinite;
    }
    
    @keyframes blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
    }
    
    h1:hover {
        animation: glitch 0.3s infinite;
    }
    
    @keyframes glitch {
        0% { text-shadow: 2px 0 red, -2px 0 blue; }
        50% { text-shadow: -2px 0 red, 2px 0 blue; }
        100% { text-shadow: 2px 0 red, -2px 0 blue; }
    }
    </style>
</head>
<body>

<div class="terminal-box">
    <h1>SELAMAT DATANG</h1>

    <p>> user: Beni</p>
    <p>> status: [ONLINE]</p>
    <p>> running: ngoding dari HP + Termux</p>
    <p>> ketik <a href="about.html" style="color:#00ffff; text-decoration:none; text-shadow:0 0 5px #00ffff;">./masuk</a> untuk lanjut<span class="cursor"></span></p>

    <a href="about.html" class="button">./about</a>
    <a href="kontak.html" class="button">./kontak</a>
</div>

</body>
</html>
