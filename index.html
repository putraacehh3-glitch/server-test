<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beni Dev</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Impact', 'Arial Black', sans-serif;
    }
    body {
        background: #0a0a0a;
        background-image: 
            linear-gradient(45deg, #1a0000 25%, transparent 25%),
            linear-gradient(-45deg, #1a0000 25%, transparent 25%);
        background-size: 40px 40px;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    .container {
        background: rgba(20, 20, 20, 0.9);
        border: 2px solid #ff0000;
        padding: 40px;
        border-radius: 0px;
        text-align: center;
        max-width: 500px;
        box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
    }
    h1 {
        font-size: 48px;
        margin-bottom: 15px;
        color: #ff0000;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 3px 3px 0px #000, 6px 6px 0px rgba(255,0,0,0.5);
    }
    p {
        font-size: 18px;
        line-height: 1.6;
        margin-bottom: 25px;
        color: #ccc;
    }
    .btn {
        background: #ff0000;
        color: #fff;
        padding: 14px 35px;
        border: 2px solid #ff0000;
        border-radius: 0px;
        font-size: 18px;
        font-weight: bold;
        text-transform: uppercase;
        cursor: pointer;
        transition: 0.2s;
    }
    .btn:hover {
        background: #000;
        color: #ff0000;
        box-shadow: 0 0 20px #ff0000;
        transform: translateY(-3px);
    }
</style>
</head>
<body>
<div class="container">
    <h1>Selamat Datang di Beni Dev</h1>
    <p>Website pertama gue, dibikin 100% pakai HP + Termux</p>
       <a href="about.html" class="btn">Masuk</a>
<div style="margin-top:30px; text-align:center;">
<a href="kontak.html" style="background:#ff0000;color:#fff;padding:12px 25px;text-decoration:none;border-radius:8px;font-weight:bold;display:inline-block;">Kontak</a>
</div>
</div>
</body>
</html>
