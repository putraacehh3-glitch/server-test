cat > game.html << 'EOF'
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game 🐍</title>
<style>
    body {
        background: #0a0a0a;
        color: #00ff00;
        font-family: 'Courier New', monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        text-align: center;
    }
    canvas {
        border: 2px solid #00ff00;
        box-shadow: 0 0 20px #00ff00;
        background: #000;
        max-width: 90vw;
        max-height: 70vh;
        display: none;
    }
    #menu { display: block; }
    #gameArea { display: none; }
    button {
        margin: 8px;
        padding: 12px 30px;
        background: transparent;
        border: 2px solid #00ff00;
        color: #00ff00;
        font-family: 'Courier New', monospace;
        font-size: 16px;
        cursor: pointer;
        border-radius: 5px;
    }
    button:hover {
        background: #00ff00;
        color: #000;
    }
    #controls {
        margin-top: 15px;
        display: none;
    }
    #controls button {
        width: 60px;
        height: 60px;
        margin: 5px;
        background: #111;
        border: 2px solid #00ff00;
        color: #00ff00;
        font-size: 24px;
        border-radius: 10px;
    }
</style>
</head>
<body>
<div id="menu">
    <h2>Snake Game 🐍</h2>
    <p>Mode: Tembus Tembok ON</p>
    <p>Pilih Kecepatan:</p>
    <button onclick="startGame(180)">Santai</button>
    <button onclick="startGame(120)">Normal</button>
    <button onclick="startGame(80)">Cepat</button>
</div>

<div id="gameArea">
    <canvas id="game" width="360" height="640"></canvas>
    <p id="info">Skor: 0</p>
    <div id="controls">
        <div><button onclick="setDir('UP')">▲</button></div>
        <div>
            <button onclick="setDir('LEFT')">◄</button>
            <button onclick="setDir('DOWN')">▼</button>
            <button onclick="setDir('RIGHT')">►</button>
        </div>
    </div>
    <button onclick="resetGame()">Menu</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const box = 20;
const cols = canvas.width / box;
const rows = canvas.height / box;
let snake, dir, food, score, game, speed;
let audioCtx;
let audioEnabled = false;

// Audio setup - aktifin pas user pencet tombol
function enableAudio() {
    if(!audioEnabled) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioEnabled = true;
    }
}

function playEatSound() {
    if(!audioEnabled) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 800;
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

function playGameOverSound() {
    if(!audioEnabled) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 200;
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
}

function startGame(selectedSpeed) {
    speed = selectedSpeed;
    document.getElementById('menu').style.display = 'none';
    document.getElementById('gameArea').style.display = 'block';
    document.getElementById('controls').style.display = 'block';
    canvas.style.display = 'block';

    snake = [{x: Math.floor(cols/2)*box, y: Math.floor(rows/2)*box}];
    dir = 'UP';
    food = spawnFood();
    score = 0;
    document.getElementById('info').textContent = 'Skor: 0';

    if(game) clearInterval(game);
    game = setInterval(draw, speed);
}

function resetGame() {
    clearInterval(game);
    document.getElementById('menu').style.display = 'block';
    document.getElementById('gameArea').style.display = 'none';
    document.getElementById('controls').style.display = 'none';
    canvas.style.display = 'none';
}

function spawnFood() {
    return {
        x: Math.floor(Math.random()*cols)*box,
        y: Math.floor(Math.random()*rows)*box
    };
}

function setDir(newDir) {
    enableAudio(); // Aktifin audio pas pencet tombol
    if(newDir==='LEFT' && dir!=='RIGHT') dir=newDir;
    if(newDir==='RIGHT' && dir!=='LEFT') dir=newDir;
    if(newDir==='UP' && dir!=='DOWN') dir=newDir;
    if(newDir==='DOWN' && dir!=='UP') dir=newDir;
}

document.addEventListener('keydown', e => {
    enableAudio();
    if(e.key === 'ArrowLeft' || e.key === 'a') setDir('LEFT');
    if(e.key === 'ArrowUp' || e.key === 'w') setDir('UP');
    if(e.key === 'ArrowRight' || e.key === 'd') setDir('RIGHT');
    if(e.key === 'ArrowDown' || e.key === 's') setDir('DOWN');
});

function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for(let i=0; i<snake.length; i++) {
        if(i === 0) {
            ctx.fillStyle = '#ffff00';
            ctx.fillRect(snake[i].x, snake[i].y, box, box);
            ctx.strokeStyle = '#ffaa00';
            ctx.lineWidth = 2;
            ctx.strokeRect(snake[i].x, snake[i].y, box, box);
        } else {
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(snake[i].x, snake[i].y, box, box);
            ctx.strokeStyle = '#008800';
            ctx.lineWidth = 1;
            ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            ctx.fillStyle = '#004400';
            ctx.beginPath();
            ctx.arc(snake[i].x + box/2, snake[i].y + box/2, 3, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    ctx.font = '20px serif';
    ctx.fillText('🍎', food.x, food.y + 18);

    let headX = snake[0].x;
    let headY = snake[0].y;

    if(dir==='LEFT') headX -= box;
    if(dir==='RIGHT') headX += box;
    if(dir==='UP') headY -= box;
    if(dir==='DOWN') headY += box;

    // Tembus tembok - FIXED
    if(headX < 0) headX = canvas.width - box;
    else if(headX >= canvas.width) headX = 0;
    if(headY < 0) headY = canvas.height - box;
    else if(headY >= canvas.height) headY = 0;

    if(headX===food.x && headY===food.y) {
        score++;
        playEatSound();
        document.getElementById('info').textContent = 'Skor: '+score;
        food = spawnFood();
    } else {
        snake.pop();
    }

    let newHead = {x: headX, y: headY};

    // Cek tabrakan diri sendiri
    for(let i=0; i<snake.length; i++) {
        if(newHead.x===snake[i].x && newHead.y===snake[i].y) {
            playGameOverSound();
            clearInterval(game);
            setTimeout(() => {
                alert('Game Over! Skor: '+score);
                resetGame();
            }, 300);
            return;
        }
    }

    snake.unshift(newHead);
}
</script>
</body>
</html>
EOF
