cat > game.html << 'EOF'
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Game 🐍</title>
<style>
    * { box-sizing: border-box; touch-action: manipulation; }
    body {
        background: #0a0a0a;
        color: #00ff00;
        font-family: 'Courier New', monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        height: 100vh;
        margin: 0;
        padding: 5px;
        overflow: hidden;
    }
    canvas {
        border: 2px solid #00ff00;
        box-shadow: 0 0 20px #00ff00;
        background: #000;
        width: 100%;
        max-width: 360px;
        max-height: 50vh;
        display: none;
    }
    #menu { display: block; text-align: center; }
    #gameArea { display: none; width: 100%; max-width: 400px; }
    button {
        margin: 5px;
        padding: 10px 20px;
        background: transparent;
        border: 2px solid #00ff00;
        color: #00ff00;
        font-family: 'Courier New', monospace;
        font-size: 16px;
        cursor: pointer;
        border-radius: 5px;
    }
    button:active {
        background: #00ff00;
        color: #000;
    }
    #controls {
        margin-top: 8px;
        display: none;
        justify-content: center;
        width: 100%;
    }
  .dpad {
        display: grid;
        grid-template-columns: 60px 60px 60px;
        grid-template-rows: 60px 60px 60px;
        gap: 5px;
    }
  .dpad button {
        width: 60px;
        height: 60px;
        margin: 0;
        background: #111;
        border: 2px solid #00ff00;
        color: #00ff00;
        font-size: 26px;
        border-radius: 12px;
        padding: 0;
        user-select: none;
    }
  .dpad button:active { background: #00ff00; color: #000; }
    #pauseBtn {
        background: #ffaa00;
        border-color: #ffaa00;
        color: #000;
        padding: 8px 15px;
        font-size: 18px;
    }
    #info {
        display: flex;
        justify-content: space-around;
        width: 100%;
        margin: 5px 0;
        font-size: 16px;
    }
  .level-btn {
        border-color: #ffaa00;
        color: #ffaa00;
    }
  .level-btn.active {
        background: #ffaa00;
        color: #000;
    }
    @media (max-height: 700px) {
    .dpad { grid-template-columns: 55px 55px 55px; grid-template-rows: 55px 55px 55px; }
    .dpad button { width: 55px; height: 55px; font-size: 22px; }
      canvas { max-height: 45vh; }
    }
</style>
</head>
<body>
<div id="menu">
    <h2>Snake Game 🐍</h2>
    <p>Pilih Level:</p>
    <button class="level-btn active" id="lvl1btn" onclick="selectLevel(1)">Level 1 - Tembus Tembok</button>
    <button class="level-btn" id="lvl2btn" onclick="selectLevel(2)">Level 2 - Ada Tembok</button>
    <button class="level-btn" id="lvl3btn" onclick="selectLevel(3)">Level 3 - 2 Apel</button>
    <br>
    <p>Pilih Kecepatan:</p>
    <button onclick="startGame(180)">Santai</button>
    <button onclick="startGame(120)">Normal</button>
    <button onclick="startGame(80)">Cepat</button>
</div>

<div id="gameArea">
    <canvas id="game" width="360" height="640"></canvas>
    <div id="info">
        <p id="score">Skor: 0</p>
        <p id="levelInfo">Level 1</p>
    </div>
    <div id="controls">
        <div class="dpad">
            <div></div><button ontouchstart="setDir('UP')" onmousedown="setDir('UP')">▲</button><div></div>
            <button ontouchstart="setDir('LEFT')" onmousedown="setDir('LEFT')">◄</button>
            <button ontouchstart="togglePause()" onmousedown="togglePause()" id="pauseBtn">⏸</button>
            <button ontouchstart="setDir('RIGHT')" onmousedown="setDir('RIGHT')">►</button>
            <div></div><button ontouchstart="setDir('DOWN')" onmousedown="setDir('DOWN')">▼</button><div></div>
        </div>
    </div>
    <button onclick="resetGame()">Menu</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const box = 20;
const cols = canvas.width / box;
const rows = canvas.height / box;

let snake, dir, foods, score, game, speed, level = 1, paused = false;
let audioCtx, audioEnabled = false;

function selectLevel(lvl) {
    level = lvl;
    document.getElementById('lvl1btn').classList.remove('active');
    document.getElementById('lvl2btn').classList.remove('active');
    document.getElementById('lvl3btn').classList.remove('active');
    document.getElementById('lvl' + lvl + 'btn').classList.add('active');
}

function enableAudio() {
    if(!audioEnabled) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioEnabled = true;
    }
}

function playEatSound() {
    if(!audioEnabled) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 800;
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

function playGameOverSound() {
    if(!audioEnabled) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 200;
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
}

function startGame(selectedSpeed) {
    enableAudio();
    speed = selectedSpeed;
    document.getElementById('menu').style.display = 'none';
    document.getElementById('gameArea').style.display = 'block';
    document.getElementById('controls').style.display = 'flex';
    canvas.style.display = 'block';

    snake = [{x: Math.floor(cols/2)*box, y: Math.floor(rows/2)*box}];
    dir = 'UP';
    foods = level === 3? [spawnFood(), spawnFood()] : [spawnFood()];
    score = 0;
    document.getElementById('score').textContent = 'Skor: 0';
    document.getElementById('levelInfo').textContent = 'Level ' + level;
    paused = false;
    document.getElementById('pauseBtn').textContent = '⏸';

    if(game) clearInterval(game);
    game = setInterval(draw, speed);
}

function resetGame() {
    clearInterval(game);
    document.getElementById('menu').style.display = 'block';
    document.getElementById('gameArea').style.display = 'none';
    document.getElementById('controls').style.display = 'none';
    canvas.style.display = 'none';
}

function togglePause() {
    paused =!paused;
    document.getElementById('pauseBtn').textContent = paused? '▶' : '⏸';
}

function spawnFood() {
    let f;
    do {
        f = {
            x: Math.floor(Math.random()*cols)*box,
            y: Math.floor(Math.random()*rows)*box
        };
    } while(snake.some(s => s.x===f.x && s.y===f.y) ||
            foods.some(f2 => f2.x===f.x && f2.y===f.y));
    return f;
}

function setDir(newDir) {
    enableAudio();
    if(newDir==='LEFT' && dir!=='RIGHT') dir=newDir;
    if(newDir==='RIGHT' && dir!=='LEFT') dir=newDir;
    if(newDir==='UP' && dir!=='DOWN') dir=newDir;
    if(newDir==='DOWN' && dir!=='UP') dir=newDir;
}

function draw() {
    if(paused) return;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Gambar tembok untuk Level 2 & 3
    if(level >= 2) {
        ctx.fillStyle = '#333';
        ctx.fillRect(0, 0, canvas.width, box);
        ctx.fillRect(0, canvas.height - box, canvas.width, box);
        ctx.fillRect(0, 0, box, canvas.height);
        ctx.fillRect(canvas.width - box, 0, box, canvas.height);
    }

    // Gambar apel
    ctx.font = '20px serif';
    foods.forEach(f => ctx.fillText('🍎', f.x, f.y + 18));

    // Gambar ular
    snake.forEach((s, i) => {
        if(i === 0) {
            ctx.fillStyle = '#ffff00';
            ctx.fillRect(s.x, s.y, box, box);
            ctx.strokeStyle = '#ffaa00';
            ctx.lineWidth = 2;
            ctx.strokeRect(s.x, s.y, box, box);
        } else {
            ctx.fillStyle = '#00ff00';
            ctx.fillRect(s.x, s.y, box, box);
            ctx.strokeStyle = '#008800';
            ctx.lineWidth = 1;
            ctx.strokeRect(s.x, s.y, box, box);
            ctx.fillStyle = '#004400';
            ctx.beginPath();
            ctx.arc(s.x + box/2, s.y + box/2, 3, 0, Math.PI * 2);
            ctx.fill();
        }
    });

    let headX = snake[0].x;
    let headY = snake[0].y;

    if(dir==='LEFT') headX -= box;
    if(dir==='RIGHT') headX += box;
    if(dir==='UP') headY -= box;
    if(dir==='DOWN') headY += box;

    // Logic tembok
    if(level === 1) {
        if(headX < 0) headX = canvas.width - box;
        else if(headX >= canvas.width) headX = 0;
        if(headY < 0) headY = canvas.height - box;
        else if(headY >= canvas.height) headY = 0;
    } else {
        if(headX < box || headX >= canvas.width - box || headY < box || headY >= canvas.height - box) {
            gameOver();
            return;
        }
    }

    // Cek makan apel
    let ateFood = false;
    foods = foods.filter(f => {
        if(headX===f.x && headY===f.y) {
            score++;
            playEatSound();
            ateFood = true;
            return false;
        }
        return true;
    });

    // Kalau apel habis, tambah lagi
    if(foods.length === 0) {
        foods.push(spawnFood());
        if(level === 3) foods.push(spawnFood());
    }

    document.getElementById('score').textContent = 'Skor: ' + score;

    if(!ateFood) snake.pop();

    let newHead = {x: headX, y: headY};

    // Cek tabrakan diri sendiri
    for(let i=0; i<snake.length; i++) {
        if(newHead.x===snake[i].x && newHead.y===snake[i].y) {
            gameOver();
            return;
        }
    }

    snake.unshift(newHead);
}

function gameOver() {
    playGameOverSound();
    clearInterval(game);
    setTimeout(() => {
        alert('Game Over! Skor: ' + score);
        resetGame();
    }, 300);
}
</script>
</body>
</html>
EOF
