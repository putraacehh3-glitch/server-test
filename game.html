cat > game.html << 'EOF'
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Game 2 Player 🐍</title>
<style>
    * { box-sizing: border-box; touch-action: manipulation; }
    body {
        background: #0a0a0a;
        color: #00ff00;
        font-family: 'Courier New', monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        height: 100vh;
        margin: 0;
        padding: 5px;
        overflow: hidden;
    }
    canvas {
        border: 2px solid #00ff00;
        box-shadow: 0 0 20px #00ff00;
        background: #000;
        width: 100%;
        max-width: 360px;
        max-height: 50vh;
        display: none;
    }
    #menu { display: block; text-align: center; }
    #gameArea { display: none; width: 100%; max-width: 400px; }
    button {
        margin: 5px;
        padding: 10px 20px;
        background: transparent;
        border: 2px solid #00ff00;
        color: #00ff00;
        font-family: 'Courier New', monospace;
        font-size: 16px;
        cursor: pointer;
        border-radius: 5px;
    }
    button:active {
        background: #00ff00;
        color: #000;
    }
    #controls {
        margin-top: 8px;
        display: none;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        gap: 5px;
    }
  .dpad {
        display: grid;
        grid-template-columns: 55px 55px 55px;
        grid-template-rows: 55px 55px 55px;
        gap: 4px;
    }
  .dpad button {
        width: 55px;
        height: 55px;
        margin: 0;
        background: #111;
        font-size: 26px;
        border-radius: 12px;
        padding: 0;
        user-select: none;
    }
    #p1pad button { border-color: #00ff00; color: #00ff00; }
    #p1pad button:active { background: #00ff00; color: #000; }
    #p2pad button { border-color: #ff00ff; color: #ff00ff; }
    #p2pad button:active { background: #ff00ff; color: #000; }
    #centerControls {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
    }
    #pauseBtn {
        background: #ffaa00;
        border-color: #ffaa00;
        color: #000;
        padding: 8px 15px;
        font-size: 18px;
        width: 70px;
    }
    #info {
        display: flex;
        justify-content: space-around;
        width: 100%;
        margin: 5px 0;
        font-size: 16px;
    }
    @media (max-height: 700px) {
      .dpad { grid-template-columns: 50px 50px 50px; grid-template-rows: 50px 50px 50px; }
      .dpad button { width: 50px; height: 50px; font-size: 22px; }
       canvas { max-height: 45vh; }
    }
</style>
</head>
<body>
<div id="menu">
    <h2>Snake Game 2 Player 🐍</h2>
    <p>Mode: Tembus Tembok ON</p>
    <button onclick="startGame(1, 120)">1 Player</button>
    <button onclick="startGame(2, 120)">2 Player</button>
</div>

<div id="gameArea">
    <canvas id="game" width="360" height="640"></canvas>
    <div id="info">
        <p id="score1">P1: 0</p>
        <p id="score2" style="display:none;">P2: 0</p>
    </div>
    <div id="controls">
        <div class="dpad" id="p1pad">
            <div></div><button ontouchstart="setDir(1, 'UP')" onmousedown="setDir(1, 'UP')">▲</button><div></div>
            <button ontouchstart="setDir(1, 'LEFT')" onmousedown="setDir(1, 'LEFT')">◄</button>
            <div></div>
            <button ontouchstart="setDir(1, 'RIGHT')" onmousedown="setDir(1, 'RIGHT')">►</button>
            <div></div><button ontouchstart="setDir(1, 'DOWN')" onmousedown="setDir(1, 'DOWN')">▼</button><div></div>
        </div>

        <div id="centerControls">
            <button id="pauseBtn" ontouchstart="togglePause()" onmousedown="togglePause()">⏸</button>
        </div>

        <div class="dpad" id="p2pad" style="display:none;">
            <div></div><button ontouchstart="setDir(2, 'UP')" onmousedown="setDir(2, 'UP')">▲</button><div></div>
            <button ontouchstart="setDir(2, 'LEFT')" onmousedown="setDir(2, 'LEFT')">◄</button>
            <div></div>
            <button ontouchstart="setDir(2, 'RIGHT')" onmousedown="setDir(2, 'RIGHT')">►</button>
            <div></div><button ontouchstart="setDir(2, 'DOWN')" onmousedown="setDir(2, 'DOWN')">▼</button><div></div>
        </div>
    </div>
    <button onclick="resetGame()">Menu</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const box = 20;
const cols = canvas.width / box;
const rows = canvas.height / box;

let players = [], food, game, speed, mode, paused = false;
let audioCtx, audioEnabled = false;

function enableAudio() {
    if(!audioEnabled) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioEnabled = true;
    }
}

function playEatSound() {
    if(!audioEnabled) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 800;
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

function playGameOverSound() {
    if(!audioEnabled) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 200;
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
}

function startGame(playerCount, selectedSpeed) {
    enableAudio();
    mode = playerCount;
    speed = selectedSpeed;
    document.getElementById('menu').style.display = 'none';
    document.getElementById('gameArea').style.display = 'block';
    document.getElementById('controls').style.display = 'flex';
    canvas.style.display = 'block';

    players = [];
    if(mode === 1) {
        players.push({
            snake: [{x: Math.floor(cols/2)*box, y: Math.floor(rows/2)*box}],
            dir: 'UP',
            score: 0,
            color: '#ffff00',
            bodyColor: '#00ff00',
            alive: true
        });
        document.getElementById('score2').style.display = 'none';
        document.getElementById('p2pad').style.display = 'none';
    } else {
        players.push({
            snake: [{x: 4*box, y: Math.floor(rows/2)*box}],
            dir: 'RIGHT',
            score: 0,
            color: '#ffff00',
            bodyColor: '#00ff00',
            alive: true
        });
        players.push({
            snake: [{x: (cols-5)*box, y: Math.floor(rows/2)*box}],
            dir: 'LEFT',
            score: 0,
            color: '#ff00ff',
            bodyColor: '#ff66ff',
            alive: true
        });
        document.getElementById('score2').style.display = 'block';
        document.getElementById('p2pad').style.display = 'grid';
    }

    food = spawnFood();
    updateScore();
    paused = false;
    document.getElementById('pauseBtn').textContent = '⏸';

    if(game) clearInterval(game);
    game = setInterval(draw, speed);
}

function resetGame() {
    clearInterval(game);
    document.getElementById('menu').style.display = 'block';
    document.getElementById('gameArea').style.display = 'none';
    document.getElementById('controls').style.display = 'none';
    canvas.style.display = 'none';
}

function togglePause() {
    paused =!paused;
    document.getElementById('pauseBtn').textContent = paused? '▶' : '⏸';
}

function spawnFood() {
    let f;
    do {
        f = {
            x: Math.floor(Math.random()*cols)*box,
            y: Math.floor(Math.random()*rows)*box
        };
    } while(players.some(p => p.snake.some(s => s.x===f.x && s.y===f.y)));
    return f;
}

function setDir(playerNum, newDir) {
    enableAudio();
    let p = players[playerNum-1];
    if(!p ||!p.alive) return;
    if(newDir==='LEFT' && p.dir!=='RIGHT') p.dir=newDir;
    if(newDir==='RIGHT' && p.dir!=='LEFT') p.dir=newDir;
    if(newDir==='UP' && p.dir!=='DOWN') p.dir=newDir;
    if(newDir==='DOWN' && p.dir!=='UP') p.dir=newDir;
}

function updateScore() {
    document.getElementById('score1').textContent = 'P1: ' + players[0].score;
    if(mode === 2) {
        document.getElementById('score2').textContent = 'P2: ' + players[1].score;
    }
}

function draw() {
    if(paused) return;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = '20px serif';
    ctx.fillText('🍎', food.x, food.y + 18);

    players.forEach((p, idx) => {
        if(!p.alive) return;

        let head = {...p.snake[0]};
        if(p.dir==='LEFT') head.x -= box;
        if(p.dir==='RIGHT') head.x += box;
        if(p.dir==='UP') head.y -= box;
        if(p.dir==='DOWN') head.y += box;

        if(head.x < 0) head.x = canvas.width - box;
        else if(head.x >= canvas.width) head.x = 0;
        if(head.y < 0) head.y = canvas.height - box;
        else if(head.y >= canvas.height) head.y = 0;

        if(head.x===food.x && head.y===food.y) {
            p.score++;
            playEatSound();
            updateScore();
            food = spawnFood();
        } else {
            p.snake.pop();
        }

        for(let i=0; i<p.snake.length; i++) {
            if(head.x===p.snake[i].x && head.y===p.snake[i].y) {
                p.alive = false;
                playGameOverSound();
                break;
            }
        }
        players.forEach((other, j) => {
            if(idx!== j && other.alive) {
                other.snake.forEach(s => {
                    if(head.x===s.x && head.y===s.y) {
                        p.alive = false;
                        playGameOverSound();
                    }
                });
            }
        });

        if(p.alive) {
            p.snake.unshift(head);
        }

        p.snake.forEach((s, i) => {
            if(i === 0) {
                ctx.fillStyle = p.color;
                ctx.fillRect(s.x, s.y, box, box);
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 2;
                ctx.strokeRect(s.x, s.y, box, box);
            } else {
                ctx.fillStyle = p.bodyColor;
                ctx.fillRect(s.x, s.y, box, box);
                ctx.strokeStyle = '#008800';
                ctx.lineWidth = 1;
                ctx.strokeRect(s.x, s.y, box, box);
            }
        });
    });

    let aliveCount = players.filter(p => p.alive).length;
    if(aliveCount === 0) {
        playGameOverSound();
        clearInterval(game);
        setTimeout(() => {
            alert(mode===1? `Game Over! Skor: ${players[0].score}` : `Game Over!\nP1: ${players[0].score}\nP2: ${players[1].score}`);
            resetGame();
        }, 300);
    }
}
</script>
</body>
</html>
EOF
