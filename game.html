cat > game.html << 'EOF'
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game 2 Player 🐍</title>
<style>
    body {
        background: #0a0a0a;
        color: #00ff00;
        font-family: 'Courier New', monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        text-align: center;
    }
    canvas {
        border: 2px solid #00ff00;
        box-shadow: 0 0 20px #00ff00;
        background: #000;
        max-width: 90vw;
        max-height: 70vh;
        display: none;
    }
    #menu { display: block; }
    #gameArea { display: none; }
    button {
        margin: 8px;
        padding: 12px 30px;
        background: transparent;
        border: 2px solid #00ff00;
        color: #00ff00;
        font-family: 'Courier New', monospace;
        font-size: 16px;
        cursor: pointer;
        border-radius: 5px;
    }
    button:hover {
        background: #00ff00;
        color: #000;
    }
    #controls {
        margin-top: 15px;
        display: none;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
    }
    #controls button {
        width: 60px;
        height: 60px;
        background: #111;
        border: 2px solid #00ff00;
        color: #00ff00;
        font-size: 24px;
        border-radius: 10px;
    }
    #pauseBtn {
        background: #ffaa00!important;
        border-color: #ffaa00!important;
        color: #000!important;
    }
    #info {
        display: flex;
        justify-content: space-around;
        width: 100%;
        max-width: 360px;
    }
</style>
</head>
<body>
<div id="menu">
    <h2>Snake Game 2 Player 🐍</h2>
    <p>Mode: Tembus Tembok ON</p>
    <button onclick="startGame(1, 120)">1 Player</button>
    <button onclick="startGame(2, 120)">2 Player</button>
</div>

<div id="gameArea">
    <canvas id="game" width="360" height="640"></canvas>
    <div id="info">
        <p id="score1">P1: 0</p>
        <p id="score2" style="display:none;">P2: 0</p>
    </div>
    <div id="controls">
        <button onclick="setDir(1, 'LEFT')">◄</button>
        <button id="pauseBtn" onclick="togglePause()">⏸</button>
        <button onclick="setDir(2, 'RIGHT')">►</button>
    </div>
    <button onclick="resetGame()">Menu</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const box = 20;
const cols = canvas.width / box;
const rows = canvas.height / box;

let players = [], food, game, speed, mode, paused = false;
let audioCtx, audioEnabled = false;

// Audio
function enableAudio() {
    if(!audioEnabled) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioEnabled = true;
    }
}

function playEatSound() {
    if(!audioEnabled) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 800;
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

function playGameOverSound() {
    if(!audioEnabled) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 200;
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
}

function startGame(playerCount, selectedSpeed) {
    mode = playerCount;
    speed = selectedSpeed;
    document.getElementById('menu').style.display = 'none';
    document.getElementById('gameArea').style.display = 'block';
    document.getElementById('controls').style.display = 'flex';
    canvas.style.display = 'block';

    players = [];
    if(mode === 1) {
        players.push({
            snake: [{x: Math.floor(cols/2)*box, y: Math.floor(rows/2)*box}],
            dir: 'UP',
            score: 0,
            color: '#ffff00',
            bodyColor: '#00ff00',
            alive: true
        });
        document.getElementById('score2').style.display = 'none';
    } else {
        players.push({
            snake: [{x: 4*box, y: Math.floor(rows/2)*box}],
            dir: 'RIGHT',
            score: 0,
            color: '#ffff00',
            bodyColor: '#00ff00',
            alive: true
        });
        players.push({
            snake: [{x: (cols-5)*box, y: Math.floor(rows/2)*box}],
            dir: 'LEFT',
            score: 0,
            color: '#ff00ff',
            bodyColor: '#ff66ff',
            alive: true
        });
        document.getElementById('score2').style.display = 'block';
    }

    food = spawnFood();
    updateScore();
    paused = false;
    document.getElementById('pauseBtn').textContent = '⏸';

    if(game) clearInterval(game);
    game = setInterval(draw, speed);
}

function resetGame() {
    clearInterval(game);
    document.getElementById('menu').style.display = 'block';
    document.getElementById('gameArea').style.display = 'none';
    document.getElementById('controls').style.display = 'none';
    canvas.style.display = 'none';
}

function togglePause() {
    paused =!paused;
    document.getElementById('pauseBtn').textContent = paused? '▶' : '⏸';
}

function spawnFood() {
    let f;
    do {
        f = {
            x: Math.floor(Math.random()*cols)*box,
            y: Math.floor(Math.random()*rows)*box
        };
    } while(players.some(p => p.snake.some(s => s.x===f.x && s.y===f.y)));
    return f;
}

function setDir(playerNum, newDir) {
    enableAudio();
    let p = players[playerNum-1];
    if(!p ||!p.alive) return;
    if(newDir==='LEFT' && p.dir!=='RIGHT') p.dir=newDir;
    if(newDir==='RIGHT' && p.dir!=='LEFT') p.dir=newDir;
    if(newDir==='UP' && p.dir!=='DOWN') p.dir=newDir;
    if(newDir==='DOWN' && p.dir!=='UP') p.dir=newDir;
}

function updateScore() {
    document.getElementById('score1').textContent = 'P1: ' + players[0].score;
    if(mode === 2) {
        document.getElementById('score2').textContent = 'P2: ' + players[1].score;
    }
}

function draw() {
    if(paused) return;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw food
    ctx.font = '20px serif';
    ctx.fillText('🍎', food.x, food.y + 18);

    // Move and draw players
    players.forEach((p, idx) => {
        if(!p.alive) return;

        // Move head
        let head = {...p.snake[0]};
        if(p.dir==='LEFT') head.x -= box;
        if(p.dir==='RIGHT') head.x += box;
        if(p.dir==='UP') head.y -= box;
        if(p.dir==='DOWN') head.y += box;

        // Wrap walls
        if(head.x < 0) head.x = canvas.width - box;
        else if(head.x >= canvas.width) head.x = 0;
        if(head.y < 0) head.y = canvas.height - box;
        else if(head.y >= canvas.height) head.y = 0;

        // Check food
        if(head.x===food.x && head.y===food.y) {
            p.score++;
            playEatSound();
            updateScore();
            food = spawnFood();
        } else {
            p.snake.pop();
        }

        // Check collision with self and others
        for(let i=0; i<p.snake.length; i++) {
            if(head.x===p.snake[i].x && head.y===p.snake[i].y) {
                p.alive = false;
                playGameOverSound();
                break;
            }
        }
        players.forEach((other, j) => {
            if(idx!== j && other.alive) {
                other.snake.forEach(s => {
                    if(head.x===s.x && head.y===s.y) {
                        p.alive = false;
                        playGameOverSound();
                    }
                });
            }
        });

        if(p.alive) {
            p.snake.unshift(head);
        }

        // Draw snake
        p.snake.forEach((s, i) => {
            if(i === 0) {
                ctx.fillStyle = p.color;
                ctx.fillRect(s.x, s.y, box, box);
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 2;
                ctx.strokeRect(s.x, s.y, box, box);
            } else {
                ctx.fillStyle = p.bodyColor;
                ctx.fillRect(s.x, s.y, box, box);
                ctx.strokeStyle = '#008800';
                ctx.lineWidth = 1;
                ctx.strokeRect(s.x, s.y, box, box);
            }
        });
    });

    // Check game over
    let aliveCount = players.filter(p => p.alive).length;
    if(aliveCount === 0) {
        playGameOverSound();
        clearInterval(game);
        setTimeout(() => {
            alert(mode===1? `Game Over! Skor: ${players[0].score}` : `Game Over!\nP1: ${players[0].score}\nP2: ${players[1].score}`);
            resetGame();
        }, 300);
    }
}

document.addEventListener('keydown', e => {
    enableAudio();
    if(e.key === 'ArrowLeft') setDir(1, 'LEFT');
    if(e.key === 'ArrowRight') setDir(1, 'RIGHT');
    if(e.key === 'ArrowUp') setDir(1, 'UP');
    if(e.key === 'ArrowDown') setDir(1, 'DOWN');
    if(e.key === 'a' || e.key === 'A') setDir(2, 'LEFT');
    if(e.key === 'd' || e.key === 'D') setDir(2, 'RIGHT');
    if(e.key === 'w' || e.key === 'W') setDir(2, 'UP');
    if(e.key === 's' || e.key === 'S') setDir(2, 'DOWN');
    if(e.key === ' ') togglePause();
});
</script>
</body>
</html>
EOF
