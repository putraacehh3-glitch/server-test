<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[root@beni-dev]~# kontak</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    
    body {
        background: #000;
        color: #00ff00;
        font-family: 'Share Tech Mono', monospace;
        text-align: center;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    
    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: repeating-linear-gradient(
            0deg,
            rgba(0, 255, 0, 0.03),
            rgba(0, 255, 0, 0.03) 1px,
            transparent 1px,
            transparent 3px
        );
        pointer-events: none;
    }
    
    .terminal-box {
        background: rgba(0, 20, 0, 0.3);
        border: 2px solid #00ff00;
        box-shadow: 0 0 20px #00ff00;
        padding: 40px 30px;
        border-radius: 5px;
        max-width: 400px;
    }
    
    h1 {
        color: #00ff00;
        text-shadow: 0 0 15px #00ff00;
        font-size: 24px;
        margin: 0 0 20px 0;
    }
    
    h1::before {
        content: "[root@beni-dev]~# ";
        font-size: 16px;
        color: #00ff00;
    }
    
    p {
        font-size: 16px;
        line-height: 1.5;
        margin: 15px 0;
    }
    
    input[type="email"] {
        background: #000;
        border: 1px solid #00ff00;
        color: #00ff00;
        padding: 10px;
        width: 80%;
        font-family: 'Share Tech Mono', monospace;
        box-shadow: 0 0 10px #00ff00;
        outline: none;
    }
    
    input[type="email"]:focus {
        box-shadow: 0 0 20px #00ff00;
    }
    
    button {
        background: transparent;
        color: #00ff00;
        border: 1px solid #00ff00;
        padding: 12px 25px;
        margin-top: 15px;
        cursor: pointer;
        font-family: 'Share Tech Mono', monospace;
        box-shadow: 0 0 10px #00ff00;
    }
    
    button:hover {
        background: #00ff00;
        color: #000;
        box-shadow: 0 0 20px #00ff00;
    }
    
    a {
        color: #00ffff;
        text-decoration: none;
        text-shadow: 0 0 5px #00ffff;
    }
    </style>
</head>
<body>

<div class="terminal-box">
    <h1>KONTAK GUE</h1>
    <p>> Masukkan email lu, nanti gue bales</p>
    <form>
        <input type="email" placeholder="email lu disini">
        <br>
        <button type="submit">Kirim</button>
    </form>
    <p><a href="index.html">← Balik ke Home</a></p>
</div>

</body>
</html>
