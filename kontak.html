<!DOCTYPE html>
<html>
<head>
<title>Kontak</title>
<style>
body {
  background:#0a0a0a;
  color:#fff;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.box {
  background:#1a1a1a;
  padding:30px;
  border-radius:10px;
  border:2px solid #ff0000;
  box-shadow:0 0 20px #ff0000;
  text-align:center;
}
input {
  padding:10px;
  width:250px;
  border:none;
  border-radius:5px;
  margin:10px 0;
  background:#333;
  color:#fff;
}
button {
  background:#ff0000;
  color:#fff;
  padding:10px 25px;
  border:none;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
}
button:hover {
  background:#cc0000;
}
a {
  color:#ff0000;
  text-decoration:none;
  display:block;
  margin-top:15px;
}
</style>
</head>
<meta charset="UTF-8">
<body>
<div class="box">
  <h2>Kontak Gue</h2>
  <p>Masukin email lu, nanti gue bales</p>
  <form>
    <input type="email" placeholder="email lu disini" required>
    <br>
    <button type="submit">Kirim</button>
  </form>
  <a href="index.html">← Balik ke Home</a>
</div>
<script>
document.querySelector("form").addEventListener("submit", function(e) {
  e.preventDefault();
  let email = document.querySelector("input[type=email]").value;
  if(email) {
    alert("Email " + email + " udah terkirim! Nanti gue bales.");
    document.querySelector("form").reset();
  }
});
</script>
</body>
</html>
